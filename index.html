
<style>
*{box-sizing:border-box;margin:0;padding:0}
#app{background:var(--color-background-tertiary);padding:16px;min-height:600px}
.screen{display:none}.screen.active{display:block}
.center{text-align:center}

.start-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:580px;gap:14px}
.logo{font-size:40px;font-weight:500;color:#6c63ff;line-height:1.1}
.logo-sub{font-size:15px;color:var(--color-text-secondary)}
.rank-row{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
.rank-pill{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:50px;padding:6px 14px;font-size:12px;color:var(--color-text-secondary)}
.start-btn{background:#6c63ff;color:#fff;border:none;padding:14px 44px;border-radius:50px;font-size:17px;font-weight:500;cursor:pointer;margin-top:6px}
.start-btn:hover{background:#5a52d5}.start-btn:active{transform:scale(.97)}

.ghdr{display:flex;justify-content:space-between;align-items:center;max-width:740px;margin:0 auto 12px;flex-wrap:wrap;gap:8px}
.hbox{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:7px 14px;font-size:13px;color:var(--color-text-secondary)}
.hval{font-size:17px;font-weight:500;color:var(--color-text-primary)}
.lvbadge{background:#6c63ff;color:#fff;border-radius:50px;padding:5px 14px;font-size:12px;font-weight:500}

.news-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:20px;max-width:740px;margin:0 auto 12px}
.breaking{display:inline-block;background:#ff4757;color:#fff;font-size:11px;font-weight:500;padding:2px 8px;border-radius:4px;margin-bottom:10px}
.ntitle{font-size:19px;font-weight:500;color:var(--color-text-primary);margin-bottom:8px;line-height:1.4}
.nbody{font-size:14px;color:var(--color-text-secondary);line-height:1.7;border-left:3px solid #6c63ff;padding-left:12px;margin-bottom:6px}
.nmeta{font-size:11px;color:var(--color-text-tertiary)}

.clue-section{max-width:740px;margin:0 auto 10px}
.clue-sec-title{font-size:13px;color:var(--color-text-secondary);margin-bottom:8px;font-weight:500}

.clue-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:16px;margin-bottom:10px}
.clue-header{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.clue-icon{font-size:20px}
.clue-name{font-size:14px;font-weight:500;color:var(--color-text-primary)}
.clue-evidence{font-size:13px;color:var(--color-text-secondary);line-height:1.5;margin-bottom:12px;background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:10px 12px}
.choices{display:flex;flex-wrap:wrap;gap:8px}
.choice-btn{border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);border-radius:var(--border-radius-md);padding:8px 14px;font-size:13px;color:var(--color-text-primary);cursor:pointer;transition:background .12s,border-color .12s}
.choice-btn:hover:not(:disabled){background:var(--color-background-secondary);border-color:#6c63ff}
.choice-btn:disabled{cursor:default;opacity:.7}
.choice-btn.selected-correct{background:#eafaf0;border-color:#2ed573;color:#176a3b;font-weight:500}
.choice-btn.selected-wrong{background:#fff0f2;border-color:#ff6b81;color:#8b1a2a;font-weight:500}
.choice-btn.reveal-correct{background:#eafaf0;border-color:#2ed573;color:#176a3b}
.clue-feedback{font-size:12px;margin-top:8px;line-height:1.5;display:none}
.clue-feedback.show{display:block}
.clue-status{display:inline-block;padding:2px 8px;border-radius:50px;font-size:11px;font-weight:500;margin-right:6px}
.st-ok{background:#eafaf0;color:#176a3b}.st-no{background:#fff0f2;color:#8b1a2a}.st-warn{background:#fff8ec;color:#7a5800}

.evbar{max-width:740px;margin:0 auto 10px;background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:10px 14px}
.evrow{display:flex;align-items:center;gap:10px}
.evlbl{font-size:12px;color:var(--color-text-secondary);white-space:nowrap}
.evdots{display:flex;gap:5px;flex:1}
.dot{width:20px;height:20px;border-radius:50%;border:0.5px solid var(--color-border-tertiary);background:var(--color-background-secondary);transition:background .25s}
.dot.ok{background:#2ed573;border-color:#2ed573}
.dot.no{background:#ff6b81;border-color:#ff6b81}
.evcnt{font-size:12px;color:var(--color-text-tertiary)}
.evhint{font-size:12px;color:var(--color-text-secondary);margin-left:auto}
.evhint.ready{color:#6c63ff;font-weight:500}

.vbtns{max-width:740px;margin:0 auto 20px;display:flex;gap:12px;justify-content:center}
.vbtn{flex:1;max-width:240px;padding:14px;border-radius:var(--border-radius-lg);font-size:15px;font-weight:500;border:2px solid transparent;cursor:pointer;transition:transform .1s,opacity .2s;display:flex;align-items:center;justify-content:center;gap:8px}
.vbtn:disabled{opacity:.3;cursor:not-allowed}.vbtn:not(:disabled):active{transform:scale(.97)}
.vbtn-real{background:#2ed573;color:#176a3b}.vbtn-real:not(:disabled):hover{background:#26c063}
.vbtn-fake{background:#ff6b81;color:#8b1a2a}.vbtn-fake:not(:disabled):hover{background:#ff4f6a}

.modal-wrap{min-height:420px;background:rgba(0,0,0,.42);display:flex;align-items:center;justify-content:center;border-radius:var(--border-radius-lg);margin:0 auto;max-width:740px}
.modal{background:var(--color-background-primary);border-radius:16px;padding:28px;max-width:460px;width:90%;text-align:center}
.res-emoji{font-size:52px;margin-bottom:10px}
.res-title{font-size:22px;font-weight:500;margin-bottom:8px;color:var(--color-text-primary)}
.res-msg{font-size:14px;color:var(--color-text-secondary);margin-bottom:14px;line-height:1.6;white-space:pre-line}
.pts-row{display:inline-flex;gap:18px;background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:10px 22px;margin-bottom:16px}
.pt-item{text-align:center}
.pt-val{font-size:19px;font-weight:500;color:var(--color-text-primary)}
.pt-lbl{font-size:11px;color:var(--color-text-secondary)}
.clue-score-row{font-size:13px;color:var(--color-text-secondary);margin-bottom:14px}
.next-btn{background:#6c63ff;color:#fff;border:none;padding:13px 36px;border-radius:50px;font-size:15px;font-weight:500;cursor:pointer;width:100%}
.next-btn:hover{background:#5a52d5}.next-btn:active{transform:scale(.97)}
.lvup{background:#fffde7;border-radius:var(--border-radius-md);padding:8px 14px;font-size:13px;font-weight:500;color:#7a5800;margin-bottom:14px;display:none}

.end-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:580px;gap:12px}
.end-trophy{font-size:58px}
.end-title{font-size:26px;font-weight:500;color:var(--color-text-primary)}
.end-rank{font-size:18px;font-weight:500;color:#6c63ff}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:400px;width:100%}
.sbox{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:12px;text-align:center}
.sn{font-size:24px;font-weight:500;color:var(--color-text-primary)}
.sl{font-size:11px;color:var(--color-text-secondary)}
.end-bdg{background:#fffde7;border:0.5px solid #ffe082;border-radius:var(--border-radius-md);padding:10px 18px;font-size:13px;color:#7a5800;max-width:400px;width:100%;text-align:center}
.retry-btn{background:#6c63ff;color:#fff;border:none;padding:13px 44px;border-radius:50px;font-size:15px;font-weight:500;cursor:pointer;margin-top:6px}
.retry-btn:hover{background:#5a52d5}
</style>

<div id="app">

<div id="ss" class="screen active">
  <div class="start-wrap">
    <div class="logo">🔍 팩트체크 수사대</div>

</div>

    <div class="hbox">단서 정답률 <span class="hval" id="hAcc">-</span></div>
  </div>

  <div class="news-card">

      <span class="evhint" id="evHint">3개 이상 완료 후 판결 가능</span>
    </div>
  </div>

  <div class="vbtns">
    <button class="vbtn vbtn-real" id="btnReal" disabled>✅ 진짜 뉴스</button>
    <button class="vbtn vbtn-fake" id="btnFake" disabled>❌ 가짜 뉴스</button>

  <div id="modalWrap" style="display:none">
    <div class="modal-wrap">
      <div class="modal">
        <div class="res-emoji" id="resEmoji"></div>
        <div class="res-title" id="resTitle"></div>
        <div class="res-msg" id="resMsg"></div>
        <div class="lvup" id="lvUp"></div>
        <div class="clue-score-row" id="clueScoreRow"></div>
        <div class="pts-row">
          <div class="pt-item"><div class="pt-val" id="resPts">+0</div><div class="pt-lbl">수사 포인트</div></div>
          <div class="pt-item"><div class="pt-val" id="resXp">+0</div><div class="pt-lbl">경험치</div></div>
        </div>
        <button class="next-btn" id="nextBtn"></button>
      </div>
    </div>
  </div>
</div>

<div id="es" class="screen">
  <div class="end-wrap">
    <div class="end-trophy" id="eTrophy"></div>
    <div class="end-title">수사 완료!</div>
    <div class="end-rank" id="eRank"></div>
    <div class="stats-grid">
      <div class="sbox"><div class="sn" id="eSc">0</div><div class="sl">총 점수</div></div>
      <div class="sbox"><div class="sn" id="eCorr">0</div><div class="sl">정답 사건</div></div>
      <div class="sbox"><div class="sn" id="eAcc">0%</div><div class="sl">단서 정답률</div></div>
    </div>
    <div class="end-bdg" id="eBdg"></div>
    <button class="retry-btn" onclick="init()">🔄 다시 수사하기</button>
  </div>
</div>

</div>

const RANKS=[{min:0,label:"🪪 인턴 수사관"},{min:3,label:"🕵️ 정식 탐정"},{min:7,label:"🧠 분석 전문가"},{min:15,label:"👑 팩트체크 마스터"}];
function getRank(n){let r=RANKS[0];for(let x of RANKS)if(n>=x.min)r=x;return r;}
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}

let S={};

function init(){
  S={score:0,xp:0,ci:0,correct:0,clueTotal:0,clueCorrect:0,solved:0};
  show('ss');
}

function startGame(){show('gs');loadCase();}

function loadCase(){
  const c=CASES[S.ci];
  document.getElementById('nTitle').textContent=c.title;
  document.getElementById('nBody').textContent=c.body;
  document.getElementById('nMeta').textContent=c.meta;
  document.getElementById('hCase').textContent=S.ci+1;
  document.getElementById('hTotal').textContent=CASES.length;
  document.getElementById('hScore').textContent=S.score;
  document.getElementById('hLv').textContent=getRank(S.solved).label;
  document.getElementById('hAcc').textContent=S.clueTotal>0?Math.round(S.clueCorrect/S.clueTotal*100)+'%':'-';
  document.getElementById('modalWrap').style.display='none';
  document.getElementById('btnReal').disabled=true;
  document.getElementById('btnFake').disabled=true;
  S.doneClues=0;S.clueAnswers=new Array(7).fill(null);

  const dots=document.getElementById('evDots');
  dots.innerHTML='';
  for(let i=0;i<7;i++){const d=document.createElement('div');d.className='dot';d.id='dot'+i;dots.appendChild(d);}
  document.getElementById('evCnt').textContent='0/7';
  document.getElementById('evHint').textContent='3개 이상 완료 후 판결 가능';
  document.getElementById('evHint').classList.remove('ready');

  const list=document.getElementById('clueList');
  list.innerHTML='';
  c.clues.forEach((cl,i)=>{
    const card=document.createElement('div');
    card.className='clue-card';
    card.id='clue-card-'+i;
    const choicesHtml=cl.choices.map((ch,j)=>`<button class="choice-btn" onclick="pickClue(${i},${j})">${ch}</button>`).join('');
    card.innerHTML=`<div class="clue-header"><div class="clue-icon">${cl.icon}</div><div class="clue-name">${cl.name}</div></div><div class="clue-evidence">${cl.evidence}</div><div class="choices" id="choices-${i}">${choicesHtml}</div><div class="clue-feedback" id="fb-${i}"></div>`;
    list.appendChild(card);
  });
}

function pickClue(ci,chosen){
  const c=CASES[S.ci];
  const cl=c.clues[ci];
  if(S.clueAnswers[ci]!==null)return;
  S.clueAnswers[ci]=chosen;
  const correct=chosen===cl.answer;
  S.clueTotal++;
  if(correct)S.clueCorrect++;

  const choicesEl=document.getElementById('choices-'+ci);
  Array.from(choicesEl.children).forEach((btn,j)=>{
    btn.disabled=true;
    if(j===chosen){
      btn.classList.add(correct?'selected-correct':'selected-wrong');
    }
    if(j===cl.answer&&!correct){
      btn.classList.add('reveal-correct');
    }
  });

  const fb=document.getElementById('fb-'+ci);
  const tag=correct?`<span class="clue-status st-ok">✔ 정확한 분석!</span>`:`<span class="clue-status st-no">✗ 다시 생각해봐요</span>`;
  fb.innerHTML=tag+cl.feedback;
  fb.classList.add('show');

  S.doneClues++;
  const dot=document.getElementById('dot'+( S.doneClues-1));
  if(dot){dot.classList.add(correct?'ok':'no');}
  document.getElementById('evCnt').textContent=S.doneClues+'/7';
  document.getElementById('hAcc').textContent=Math.round(S.clueCorrect/S.clueTotal*100)+'%';

  if(S.doneClues>=3){
    document.getElementById('btnReal').disabled=false;
    document.getElementById('btnFake').disabled=false;
    document.getElementById('evHint').textContent='⚖️ 판결 준비 완료!';
    document.getElementById('evHint').classList.add('ready');
  }
}

function verdict(isReal){
  const c=CASES[S.ci];
  const hit=isReal===c.real;
  const clueBonus=S.clueCorrect;
  const pts=hit?(80+clueBonus*10):0;
  const xpGain=hit?50:10;
  S.score+=pts;S.xp+=xpGain;
  if(hit){S.correct++;S.solved++;}

  const prevRank=getRank(S.solved-(hit?1:0)).label;
  const newRank=getRank(S.solved).label;
  const lvup=hit&&prevRank!==newRank&&S.ci>0;

  document.getElementById('resEmoji').textContent=hit?'🎉':'🚨';
  document.getElementById('resTitle').textContent=hit?'사건 해결 성공!':'수사 실패!';
  document.getElementById('resMsg').textContent=(hit?'잘 분석했어요!\n':'아쉽게 틀렸어요.\n')+c.explanation;
  document.getElementById('clueScoreRow').textContent='단서 정답: '+S.clueCorrect+'/'+S.doneClues+'개 (보너스 점수 +'+S.clueCorrect*10+'점 포함)';
  document.getElementById('resPts').textContent='+'+pts;
  document.getElementById('resXp').textContent='+'+xpGain;

  const lv=document.getElementById('lvUp');
  if(lvup){lv.textContent='🎊 레벨 업! '+newRank+' 로 승급!';lv.style.display='block';}
  else lv.style.display='none';

  const nb=document.getElementById('nextBtn');
  if(S.ci+1>=CASES.length){nb.textContent='🏆 결과 보기';nb.onclick=showEnd;}
  else{nb.textContent='다음 사건 →';nb.onclick=()=>{S.ci++;loadCase();};}

  document.getElementById('modalWrap').style.display='block';
}

function showEnd(){
  show('es');
  const rank=getRank(S.solved);
  document.getElementById('eTrophy').textContent=S.solved>=CASES.length*0.8?'🏆':S.solved>=CASES.length*0.5?'🥈':'🥉';
  document.getElementById('eRank').textContent=rank.label;
  document.getElementById('eSc').textContent=S.score;
  document.getElementById('eCorr').textContent=S.correct+'/'+CASES.length;
  document.getElementById('eAcc').textContent=Math.round(S.clueCorrect/S.clueTotal*100)+'%';
  const bdgs=['모든 단서를 꼼꼼히 분석하는 진짜 수사관!','증거 기반 추리로 허위 정보를 잡아냈어요!','팩트체크 능력 +1 획득!'];
  document.getElementById('eBdg').textContent='🏅 '+bdgs[Math.floor(Math.random()*bdgs.length)];
}

document.getElementById('startBtn').onclick=startGame;
document.getElementById('btnReal').onclick=()=>verdict(true);
document.getElementById('btnFake').onclick=()=>verdict(false);
init();
</script>
